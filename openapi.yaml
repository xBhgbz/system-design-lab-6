openapi: 3.0.0
info:
  title: Hotel Booking API
  version: 1.0.0
  description: API for Variant 13 (Hotel Booking System)
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
paths:
  /api/users/register:
    post:
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login: { type: string }
                password: { type: string }
                firstName: { type: string }
                lastName: { type: string }
      responses:
        201: { description: Created }
        409: { description: Conflict }
  /api/users/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login: { type: string }
                password: { type: string }
      responses:
        200: 
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
  /api/users:
    get:
      summary: Search users
      parameters:
        - in: query
          name: login
          schema: { type: string }
        - in: query
          name: name_mask
          schema: { type: string }
      responses:
        200: { description: List of users or single user }
  /api/hotels:
    get:
      summary: List hotels
      parameters:
        - in: query
          name: city
          schema: { type: string }
      responses:
        200: { description: List of hotels }
    post:
      summary: Create hotel
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                city: { type: string }
                stars: { type: integer }
      responses:
        201: { description: Created }
        401: { description: Unauthorized }
  /api/bookings:
    get:
      summary: Get user bookings
      security: [{ bearerAuth: [] }]
      responses:
        200: { description: List of bookings }
    post:
      summary: Create booking
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hotelId: { type: integer }
                startDate: { type: string }
                endDate: { type: string }
      responses:
        201: { description: Created }
  /api/bookings/{id}:
    delete:
      summary: Cancel booking
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        204: { description: No Content }
        404: { description: Not Found }